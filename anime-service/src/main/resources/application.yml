spring:
  application:
    name: anime-service
  datasource:
    url: jdbc:mysql://localhost:3306/anime_service?useTimezone=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${ENV_ROOT_USER:root}
    password: ${ENV_ROOT_PASSWORD:devdojo}
  web:
    error:
      include-stacktrace: on_param
  threads:
    virtual:
      enabled: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
server:
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 20

logging:
  level:
    root: INFO
    academy.devdojo: DEBUG

management:
  server:
    port: 8989
  endpoints:
    web:
      exposure:
        include: "*"
