spring:
  sql:
    init:
      mode: always
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
  web:
    error:
      include-binding-errors: always
      include-message: always
  flyway:
    enabled: true
    locations: classpath:db/migration-test

brasil-api:
  base-url: http://localhost:${wiremock.server.port}/api
  cep-uri: /cep/v1/{cep}