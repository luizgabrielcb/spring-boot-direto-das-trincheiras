spring:
  sql:
    init:
      mode: always
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  web:
    error:
      include-binding-errors: always
      include-message: always

brasil-api:
  base-url: https://localhost:8787/api
  cep-uri: /cep/v1/{cep}